<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #FF6B00;
      --secondary: #6B7280;
      --accent: #D4A853;
      --dark: #1A1A2E;
      --bg: #FFFFFF;
      --cream: #FDF8F0;
      --text: #111827;
      --text-light: #9CA3AF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Tajawal', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      direction: rtl;
      line-height: 1.7;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    h1, h2, h3 {
      font-family: 'Cairo', 'Inter', sans-serif;
      color: var(--dark);
      line-height: 1.3;
    }

    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    h2 { font-size: 1.5rem; font-weight: 600; margin-top: 32px; margin-bottom: 12px; color: var(--primary); }
    h3 { font-size: 1.15rem; font-weight: 600; margin-top: 24px; margin-bottom: 8px; }

    p { margin-bottom: 16px; }

    .subtitle {
      color: var(--secondary);
      font-size: 1.1rem;
      margin-bottom: 32px;
    }

    .badge {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .accent-line {
      width: 60px;
      height: 4px;
      background: var(--primary);
      margin-bottom: 24px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 0.95rem;
    }

    th {
      background: var(--dark);
      color: white;
      padding: 10px 14px;
      text-align: right;
      font-weight: 600;
    }

    td {
      padding: 10px 14px;
      border-bottom: 1px solid #E5E7EB;
    }

    tr:nth-child(even) { background: var(--cream); }

    ul, ol {
      padding-right: 24px;
      margin-bottom: 16px;
    }

    li { margin-bottom: 6px; }

    .cta-section {
      background: var(--cream);
      border-right: 4px solid var(--primary);
      padding: 24px;
      margin: 32px 0;
      border-radius: 0 8px 8px 0;
    }

    .cta-button {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 12px 32px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      margin-top: 12px;
    }

    .cta-button:hover { opacity: 0.9; }

    .highlight { color: var(--primary); font-weight: 600; }
    .gold { color: var(--accent); }

    blockquote {
      border-right: 3px solid var(--accent);
      padding: 12px 20px;
      margin: 16px 0;
      background: var(--cream);
      font-style: italic;
      color: var(--secondary);
    }

    code {
      background: var(--cream);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.9em;
    }

    .footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid #E5E7EB;
      color: var(--text-light);
      font-size: 0.85rem;
      text-align: center;
    }

    /* English content override */
    [lang="en"], .ltr { direction: ltr; text-align: left; }
  </style>
</head>
<body>
  <div class="container">
    {{CONTENT}}
    <div class="footer">
      Entrepreneurs Oasis MENA &mdash; Signal-Verified Launch Platform
    </div>
  </div>
</body>
</html>
