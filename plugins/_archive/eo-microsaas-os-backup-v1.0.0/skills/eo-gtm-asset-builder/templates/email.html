<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <!--[if mso]>
  <style type="text/css">
    body, table, td { font-family: Arial, sans-serif !important; }
  </style>
  <![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#F9FAFB;font-family:'Tajawal',Arial,sans-serif;direction:rtl;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#F9FAFB;">
    <tr>
      <td align="center" style="padding:24px 16px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#FFFFFF;border-radius:8px;overflow:hidden;max-width:600px;">
          <!-- Header -->
          <tr>
            <td style="background-color:#1A1A2E;padding:24px 32px;">
              <h1 style="margin:0;font-family:'Cairo',Arial,sans-serif;font-size:20px;font-weight:700;color:#FFFFFF;">Entrepreneurs Oasis</h1>
              <p style="margin:4px 0 0;font-size:13px;color:#D4A853;">Signal-Verified Launch Platform</p>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:32px;">
              {{CONTENT}}
            </td>
          </tr>
          <!-- CTA -->
          <tr>
            <td style="padding:0 32px 32px;">
              <table role="presentation" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="background-color:#FF6B00;border-radius:6px;">
                    <a href="{{CTA_URL}}" style="display:inline-block;padding:12px 32px;color:#FFFFFF;font-family:'Cairo',Arial,sans-serif;font-size:15px;font-weight:600;text-decoration:none;">{{CTA_TEXT}}</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="background-color:#FDF8F0;padding:20px 32px;border-top:1px solid #E5E7EB;">
              <p style="margin:0;font-size:12px;color:#6B7280;text-align:center;">
                Entrepreneurs Oasis MENA<br>
                <a href="{{UNSUBSCRIBE_URL}}" style="color:#6B7280;text-decoration:underline;">Unsubscribe</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
